<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특수 길잡이</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey={{ KAKAO_MAP_KEY }}&libraries=services"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="map"></div>
    <div id="result_info" class="result-info hidden">
        조건에 맞는 학교: <span>0</span>개
    </div>
    <div class="card hidden">
        <div class="card_header">
            <p id="school_name">학교 이름</p>
            <button class="close_btn">← 뒤로가기</button>
        </div>
        <div class="card_content">
            <img id="school_photo" src="" alt="학교 사진">
            <p id="school_location">학교 주소</p>
            <p id="disable_type">어떤 장애인 전용 학교</p>
            <p id="school_type">설립구분</p>
            <p id="school_number">대표번호</p>
            <p id="school_homepage">
                <a id="school_homepage_link" href="#" target="_blank" rel="noopener"></a>
            </p>
            <div class="chart_section">
                <h4>과정별 학생수</h4>
                <canvas id="school_chart"></canvas>
            </div>
            <p id="total_students">총 학생 수</p>
            <div class="disability_section">
                <h4>장애유형 구성비</h4>
                <canvas id="disability_chart"></canvas>
                <p class="caption">*최큰 신입생 기준</p>
            </div>
            <div class="stats_section">
                <h4>방과후학교</h4>
                <div class="stats_grid">
                    <div class="stat">
                        <div class="stat_value" id="stat_curr_pgm">-</div>
                        <div class="stat_label">교과 프로그램</div>
                    </div>
                    <div class="stat">
                        <div class="stat_value" id="stat_curr_std">-</div>
                        <div class="stat_label">교과 수강생</div>
                    </div>
                    <div class="stat">
                        <div class="stat_value" id="stat_apt_pgm">-</div>
                        <div class="stat_label">특기적성</div>
                    </div>
                    <div class="stat">
                        <div class="stat_value" id="stat_apt_std">-</div>
                        <div class="stat_label">특기 수강생</div>
                    </div>
                     <div class="stat">
                        <div class="stat_value" id="stat_special_cls">-</div>
                        <div class="stat_label">종일반 학급</div>
                    </div>
                    <div class="stat">
                        <div class="stat_value" id="stat_special_std">-</div>
                        <div class="stat_label">종일반 학생</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="filter">
    <div class="filter_box">
        <div class="filter_header">
            <h3>상세 필터</h3>
            <button class="close_btn" aria-label="필터 닫기">✕</button>
        </div>

        <div class="filter_body">
            <div class="filter_group">
                <label for="sido">지역 (시/도)</label>
                <select id="sido" name="sido">
                    <option value="all">전체</option>
                    <option value="서울특별시">서울특별시</option>
                    <option value="부산광역시">부산광역시</option>
                    <option value="대구광역시">대구광역시</option>
                    <option value="인천광역시">인천광역시</option>
                    <option value="광주광역시">광주광역시</option>
                    <option value="대전광역시">대전광역시</option>
                    <option value="울산광역시">울산광역시</option>
                    <option value="세종특별자치시">세종특별자치시</option>
                    <option value="경기도">경기도</option>
                    <option value="강원특별자치도">강원특별자치도</option>
                    <option value="충청북도">충청북도</option>
                    <option value="충청남도">충청남도</option>
                    <option value="전라남도">전라남도</option>
                    <option value="경상북도">경상북도</option>
                    <option value="경상남도">경상남도</option>
                    <option value="제주특별자치도">제주특별자치도</option>
                    <option value="전북특별자치도">전북특별자치도</option>
                </select>
            </div>
            <div class="filter_group">
                <label for="what_school">학교 종류</label>
                <select id="what_school" name="what_school">
                    <option value="all">전체</option>
                    <option value="국립">국립</option>
                    <option value="공립">공립</option>
                    <option value="사립">사립</option>
                </select>
            </div>

            <div class="filter_group">
                <label>과정 (다중 선택 가능)</label>
                <div class="checkbox_group">
                    <label><input type="checkbox" name="grade" value="유치부"> 유치부</label>
                    <label><input type="checkbox" name="grade" value="초등부"> 초등부</label>
                    <label><input type="checkbox" name="grade" value="중등부"> 중등부</label>
                    <label><input type="checkbox" name="grade" value="고등부"> 고등부</label>
                    <label><input type="checkbox" name="grade" value="전공과"> 전공과</label>
                </div>
            </div>

            <div class="filter_group">
                <label for="disability_type">장애 유형</label>
                <select id="disability_type" name="disability_type">
                    <option value="all">전체</option>
                    <option value="시각장애">시각장애</option>
                    <option value="청각장애">청각장애</option>
                    <option value="정신지체">정신지체 (지적장애)</option>
                    <option value="지체장애">지체장애</option>
                    <option value="정서·행동장애">정서·행동장애</option>
                    <option value="자폐성장애">자폐성장애</option>
                    <option value="발달지체">발달지체</option>
                </select>
            </div>

            <div class="filter_group">
                <label for="distance">내 위치 기준 거리</label>
                <select id="distance" name="distance">
                    <option value="all">전체</option>
                    <option value="1">1km 이내</option>
                    <option value="3">3km 이내</option>
                    <option value="5">5km 이내</option>
                    <option value="10">10km 이내</option>
                </select>
                <p class="filter_hint">* 내 위치 정보를 허용한 경우에만 정확히 작동합니다.</p>
            </div>
        </div>

        <div class="filter_group">
            <label>방과후 프로그램 (선택 항목 모두 운영)</label>
            <div class="checkbox_group">
                <label><input type="checkbox" name="afterschool" value="curr"> 교과 프로그램</label>
                <label><input type="checkbox" name="afterschool" value="apt"> 특기적성</label>
                <label><input type="checkbox" name="afterschool" value="allday"> 종일반 학급</label>
            </div>
        </div>

        <div class="filter_footer">
            <button id="reset_filter" class="btn_reset">초기화</button>
            <button id="apply_filter" class="btn_apply">조건 적용하기</button>
        </div>
    </div>
    </div>
    <div class="current_location">
        <button id="back_to_current_location">📍현재 위치로 돌아가기</button>
    </div>
    <div class="filter_toggle">
        <button id="open_filter_btn">🔍 상세 필터</button>
    </div>
    <script src="{{ url_for('static', filename='js/card.js')}}"></script>
    <script src="{{ url_for('static', filename='js/map.js')}}"></script>
    <script src="{{ url_for('static', filename='js/filter.js')}}"></script>
</body>
</html>
